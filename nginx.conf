server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Robustness / transport ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/manifest+json font/woff2;

    # Don't leak nginx version.
    server_tokens off;

    # Security headers live in a snippet because nginx's add_header does NOT
    # inherit into any location that declares its own add_header. We therefore
    # re-include it in every location below that needs caching headers, so the
    # document and assets always carry these. (See security-headers.conf.)

    # ---- Lightweight health endpoint for Docker / Swarm probes ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- App shell: must always revalidate so deploys are picked up ----
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Service worker + manifest must never be served stale.
    location = /sw.js {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
    }

    # ---- Hashed, content-addressed build assets: cache hard ----
    # `^~` so these win over the generic media regex below (regex locations
    # otherwise take precedence over prefix ones).
    location ^~ /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---- Discord presence helper binaries (downloaded from the Preferences page) ----
    # `^~` so this wins over the media regex below. Force a download with the
    # right type: the macOS/Linux builds are extensionless and would otherwise be
    # served as text/plain and shown in the browser instead of saved.
    location ^~ /helper/ {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ---- Companion extension download (packed from the private repo) ----
    # `^~` so it wins over the media regex below and isn't swallowed by the SPA
    # fallback. No forced attachment: crimson-extension.zip carries the zip mime
    # type (browsers download it), while manifest.json stays readable so the
    # /extension Download page can fetch the live version. Short cache so a new
    # extension build propagates within the hour.
    location ^~ /extension/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ---- Other static media (non-hashed: favicon, icons, og image) ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ---- SPA routing fallback ----
    # NOTE: no `$uri/` here on purpose. The SPA has a `/extension` route, but the
    # build also copies the packed companion into a physical `extension/` dir
    # (served by the `^~ /extension/` block above). With `$uri/`, reloading
    # `/extension` matched that directory, 301-redirected to `/extension/`, and
    # 404'd (no index there). Dropping `$uri/` is the idiomatic SPA fallback and
    # routes every non-file URL to index.html; the real download dir is still
    # reachable via its own `^~ /extension/` prefix block.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri /index.html;
    }
}
