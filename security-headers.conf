# Shared security headers. Included from each location in nginx.conf so they
# survive nginx's add_header non-inheritance behaviour. `always` ensures they
# are emitted on error responses too.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Content-Security-Policy. The high-value protection here is `script-src 'self'`:
# the built app loads only its own hashed /assets/*.js (no inline scripts, no CDN
# scripts — verified), so injected <script> can't execute. The rest is locked to
# 'self'/'none' except where the app genuinely needs cross-origin:
#   * img-src https: + data:  — posters/covers come from many CDNs (TMDB, AniList…)
#   * connect-src *.crimsonhaven.to — the backend API / NDJSON stream. UPDATE this
#     if the API moves off crimsonhaven.to (it must match VITE_API_BASE_URL).
#   * frame-src https: — the player iframe loads same-origin proxy/player pages
#     AND, for the legacy/direct sources, third-party embed players.
# style-src keeps 'unsafe-inline' for React inline styles + Tailwind; tightening
# that needs nonces and isn't worth the churn for a style-only vector.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' https:; connect-src 'self' https://*.crimsonhaven.to; frame-src https:; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
