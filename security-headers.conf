# Shared security headers. Included from each location in nginx.conf so they
# survive nginx's add_header non-inheritance behaviour. `always` ensures they
# are emitted on error responses too.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Content-Security-Policy. The high-value protection here is `script-src 'self'`
# plus ONE pinned hash: the only inline script is index.html's theme FOUC guard,
# allowed by its sha256 below. If that inline script changes AT ALL (even
# whitespace), recompute the hash or the theme guard is silently CSP-blocked:
# (CRLF→LF matters: the browser hashes the served bytes, which are LF)
#   node -e "const c=require('crypto'),m=require('fs').readFileSync('index.html','utf8').replace(/\r\n/g,'\n').match(/<script>([\s\S]*?)<\/script>/);console.log('sha256-'+c.createHash('sha256').update(m[1]).digest('base64'))"
# Everything else the app runs is its own hashed /assets/*.js, so injected
# <script> still can't execute. (Cloudflare's bot-detection inline snippet at
# the end of <body> stays blocked — it's dynamic and unhashable; harmless.)
# The rest is locked to 'self'/'none' except where the app genuinely needs
# cross-origin:
#   * img-src https: + data:  — posters/covers come from many CDNs (TMDB, AniList…)
#   * connect-src https: — the backend API / NDJSON stream lives on crimsonhaven.to,
#     but the client source engine (New System E3) resolves VOE/AniWorld/S.to/etc.
#     in the browser and the in-app hls.js then loads the stream straight from the
#     hoster's CDN. Those CDNs rotate (cloudwindow-route.com, *.workers.dev,
#     shegu.net, …) and can't be enumerated, so connect-src must allow any https
#     origin or every client-resolved playback is CSP-blocked. script-src stays
#     'self' (the real XSS floor), so this only widens where fetch/XHR/MSE may
#     *connect*, not what code may run.
#     Also allows ws://127.0.0.1:* + ws://localhost:* so the opt-in Discord Rich
#     Presence can reach the desktop client's loopback RPC server (ports 6463-6472).
#     Loopback is "potentially trustworthy", so upgrade-insecure-requests leaves
#     these plaintext ws:// URLs alone (Discord's RPC server speaks no TLS).
#   * frame-src https: — the player iframe loads same-origin proxy/player pages
#     AND, for the legacy/direct sources, third-party embed players.
#   * media-src adds `blob:` — the in-app CrimsonPlayer uses hls.js, which feeds
#     the <video> via MediaSource Extensions (a blob: object URL). Without blob:
#     here, MSE is blocked: HLS playlists load (that's connect-src) but playback
#     and every segment silently fail. (hls.js's *worker* is disabled in the
#     player to avoid also needing `worker-src blob:`; main-thread demux is fine.)
# style-src keeps 'unsafe-inline' for React inline styles + Tailwind; tightening
# that needs nonces and isn't worth the churn for a style-only vector.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'sha256-pQwnCJLuKrqlsvT0kz9fkTRQyx2kl1ErwVPWlvO9r6E='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' https: blob:; connect-src 'self' https: ws://127.0.0.1:* ws://localhost:*; frame-src https:; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
