<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Installable web app (PWA) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a0005" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crimsonhaven" />

    <!-- Theme FOUC guard: apply the saved per-device theme before first paint so
         non-default (e.g. light "Catgirl Lumi") users never flash the dark look.
         Mirrors src/hooks/theme.js — the default theme sets no attribute. -->
    <script>
      try {
        var t = localStorage.getItem('crimson:theme');
        if (t && t !== 'crimson') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>

    <title>Crimsonhaven | Your Anime Sanctuary</title>
    <meta name="description" content="Welcome to the regal sanctuary of anime manifestations. I am Lumi, your crimson curator! ( ^ . ^ ) Step into our haven for a seamless streaming experience. ✨" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:title" content="Crimsonhaven | Your Anime Sanctuary" />
    <meta property="og:description" content="Welcome to the regal sanctuary of anime manifestations. I am Lumi, your crimson curator! ( ^ . ^ ) Step into our haven for a seamless streaming experience. ✨" />
    <meta property="og:image" content="__SITE_URL__/crimson_embed.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1350" />
    <meta property="og:image:alt" content="Crimsonhaven — watch anime without bullshit. No ads, no paywall, no viruses." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="__SITE_URL__/" />
    <meta property="twitter:title" content="Crimsonhaven | Your Anime Sanctuary" />
    <meta property="twitter:description" content="Welcome to the regal sanctuary of anime manifestations. I am Lumi, your crimson curator! ( ^ . ^ ) Step into our haven for a seamless streaming experience. ✨" />
    <meta property="twitter:image" content="__SITE_URL__/crimson_embed.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
