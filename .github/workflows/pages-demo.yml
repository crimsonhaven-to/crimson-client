name: Deploy demo to GitHub Pages

# Publishes a SOURCELESS demo of the client to GitHub Pages at demo.crimsonhaven.to.
#
#   * a published Release        -> build + deploy (tracks stable, like prod).
#   * manual (workflow_dispatch)  -> rebuild on demand.
#
# Deliberately CLEAN, to mirror the demo backend:
#   * crimson-sources is NOT vendored (it's private), so vite.config.js swaps in the
#     no-op stub (src/sourcesStub.js) — the demo resolves NOTHING client-side. The
#     demo backend has no sources either, so the demo shows the UI + account UX only,
#     never a stream (by design — no streams = nothing to host).
#   * crimson-extension IS baked in, though: the companion repo is PUBLIC, so we clone
#     + pack it into dist/extension/ (exactly like the prod image's `extpack` stage) so
#     the /extension download page works on the demo too. It's hardcoded to the public
#     crimsonhaven-to/crimson-extension@main — no token needed.
#   * VITE_API_BASE_URL is baked to the demo backend at build time.
#
# Runs on GitHub-hosted runners (no swarm / self-hosted runner needed). Requires the
# repo to be PUBLIC (or the org on a plan that allows private-repo Pages) and Pages
# set to the "GitHub Actions" source in repo Settings. The custom domain is carried by
# the CNAME file written below (demo.crimsonhaven.to).

on:
  release:
    types: [published]
  workflow_dispatch:

# One Pages deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages-demo
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # No submodule / vendor fetch on purpose — a sourceless demo build.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (sourceless, pointed at the demo backend)
        env:
          # Baked in by Vite at build time (see hooks.js API_BASE_URL).
          VITE_API_BASE_URL: https://demo-backend.crimsonhaven.to
        run: npm run build

      - name: Bake in the companion extension (public)
        run: |
          set -euo pipefail
          # The companion extension is PUBLIC, so clone it straight at main (no token)
          # and pack it exactly like the Dockerfile's `extpack` stage does for the prod
          # image: a zip that unpacks to a single `crimson-extension/` folder (with
          # manifest.json at its root — what "Load unpacked" expects), plus the loose
          # manifest.json so the /extension page can show the version without hardcoding.
          # NOTE: only the extension is baked in — crimson-sources stays stubbed.
          git clone --depth 1 --branch main \
            https://github.com/crimsonhaven-to/crimson-extension.git crimson-extension
          rm -rf crimson-extension/.git
          mkdir -p dist/extension
          zip -r -X dist/extension/crimson-extension.zip crimson-extension
          cp crimson-extension/manifest.json dist/extension/manifest.json
          rm -rf crimson-extension
          echo "✓ companion extension baked into dist/extension"

      - name: SPA fallback + custom domain
        run: |
          # GitHub Pages has no SPA rewrite; serving index.html as 404.html makes
          # deep links (/watch/...) resolve to the app instead of a 404.
          cp dist/index.html dist/404.html
          # Custom domain — GitHub reads this from the published artifact.
          echo 'demo.crimsonhaven.to' > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
