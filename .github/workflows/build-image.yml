name: Build and Deploy

# Build the Vite frontend, bake it into an nginx image, push it to the PRIVATE
# GitHub Container Registry (GHCR), then roll it out to the Docker Swarm.
#
#   * push to `dev`       -> build + push ghcr.io/.../crimson-client:dev
#                            with VITE_API_BASE_URL = https://dev-backend...
#                            (no deploy).
#   * a published Release -> build + push :<tag> and :latest with
#                            VITE_API_BASE_URL = https://backend... then deploy
#                            that immutable :<tag> to the swarm (zero-downtime,
#                            health-gated, auto-rollback).
#
# The private sources engine is fetched best-effort at the freshest branch tip
# per channel (build-time only; nothing is committed back):
#   * push to `dev`       -> sources@dev.
#   * a published Release -> sources@main.
# The companion extension is NOT baked in: it ships on the Chrome Web Store and
# the /extension page links straight to that listing.
#
# Which repos to fetch is ENV-DRIVEN (not hardcoded): set the repo secret
# CRIMSON_SOURCES_REPO (e.g. crimsonhaven-to/crimson-sources) + SUBMODULES_TOKEN.
# If a repo is unset or unreachable, the build STILL succeeds with no client-side
# sources (Vite swaps in the built-in stub) — so anyone without access can deploy.
#
# IMPORTANT: VITE_API_BASE_URL is baked in at BUILD time (Vite), so dev and
# release builds point at different backends. The image is PRIVATE; swarm nodes
# pull it with the durable read:packages login already configured on the
# managers, shipped by `docker stack deploy --with-registry-auth`.
#
# Runner: the same org-level self-hosted runner on the jumphost `server10` used
# by crimson-backend (Docker + buildx + passwordless SSH to the managers).

on:
  push:
    branches:
      - dev
    # Doc-only commits shouldn't rebuild + redeploy the dev image.
    paths-ignore:
      - '**.md'
  release:
    types: [published]
  # Sources-driven rebuild: crimson-sources' own CI fires this (via the API) on a
  # push to its `dev` branch, so a change to the client-side sources engine ships to
  # dev.crimsonhaven WITHOUT a manual submodule bump / client push. It behaves exactly
  # like a `dev` push (builds :dev-<sha> from sources@dev and rolls the dev stack) —
  # see `.github/workflows/deploy-client-dev.yml` in crimson-sources. Also runnable by
  # hand from the Actions tab. Pick ref `dev` when dispatching.
  workflow_dispatch:

concurrency:
  group: crimson-client-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/crimsonhaven-to/crimson-client
  SWARM_MANAGER: crimsonswarm01

jobs:
  # Quality gate — MUST pass before the image is built/deployed. ESLint over the
  # app source (vendored submodules are excluded — they're linted in their own
  # repos) plus the Vitest unit suite (pure logic: the stream ranker, playback-pref
  # sanitiser, error extraction — jsdom, no browser). No submodule checkout needed,
  # so it's fast. Runs in a clean node:24-slim container on the same self-hosted runner.
  gate:
    runs-on: [self-hosted]
    container: node:24-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Hand the workspace back to the host runner
        if: always()
        # This container job writes files as root into the shared self-hosted
        # workspace; make them world-writable so the next (host-run) `build` job's
        # checkout can delete them. Without this it fails with EACCES.
        run: chmod -R a+rwX "$GITHUB_WORKSPACE" || true

  build:
    needs: gate
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      deploy: ${{ steps.meta.outputs.deploy }}
      # The exact, immutable tag to deploy (vX.Y.Z on release, dev-<sha> on dev).
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # The private sources submodule is intentionally NOT checked out here. It's
        # fetched best-effort in the next step, so a build WITHOUT access to it
        # still succeeds (Vite swaps in the no-op stub).

      - name: Fetch private sources (optional, env-driven)
        env:
          # Which repo holds the client-side sources engine. Set as a repo SECRET
          # (e.g. crimsonhaven-to/crimson-sources). UNSET / unreachable => build
          # with NO sources: vite.config.js swaps in src/sourcesStub.js and the
          # client plays via the backend only. Never hardcoded here.
          SOURCES_REPO: ${{ secrets.CRIMSON_SOURCES_REPO }}
          GIT_TOKEN: ${{ secrets.SUBMODULES_TOKEN || github.token }}
        run: |
          set -u
          # Freshest code per channel: release -> main, otherwise dev.
          if [ "${{ github.event_name }}" = "release" ]; then SOURCES_BRANCH=main; else SOURCES_BRANCH=dev; fi

          # Clone <repo>@<branch> into <dest>, best-effort. Any failure (repo
          # unset, no access, branch missing) leaves an EMPTY <dest> and never
          # fails the job — that's the whole point of the safeguard.
          fetch() {  # <repo slug or empty> <branch> <dest>
            repo="$1"; branch="$2"; dest="$3"
            rm -rf "$dest"
            if [ -z "$repo" ]; then
              mkdir -p "$dest"
              echo "ℹ  no repo configured for ${dest} — building without it"
              return 0
            fi
            url="https://x-access-token:${GIT_TOKEN}@github.com/${repo}.git"
            echo "::group::Fetching ${repo}@${branch} -> ${dest}"
            if git clone --depth 1 --branch "$branch" "$url" "$dest"; then
              ok=1
            else
              rm -rf "$dest"
              if git clone --depth 1 "$url" "$dest"; then ok=1; else ok=0; fi
            fi
            if [ "$ok" = 1 ]; then
              rm -rf "$dest/.git"
              echo "✓  ${repo} bundled"
            else
              rm -rf "$dest"; mkdir -p "$dest"
              echo "⚠  could not fetch ${repo} (no access / not found) — building without it"
            fi
            echo "::endgroup::"
          }

          fetch "$SOURCES_REPO" "$SOURCES_BRANCH" vendor/crimson-sources

      - name: Compute image tags + API URL
        id: meta
        env:
          # A release tag name is externally-influenced input, so it's passed
          # through the environment instead of being interpolated straight into
          # the script body — that keeps it out of shell command position (it's
          # never re-parsed by the shell). The guard below then constrains it to
          # a safe charset before it flows into image tags, job outputs, and the
          # remote deploy command.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VER="$RELEASE_TAG"
            if ! printf '%s' "$VER" | grep -Eq '^[A-Za-z0-9._-]+$'; then
              echo "::error::Refusing to build/deploy an unsafe release tag: '$VER'"
              exit 1
            fi
            echo "version=${VER}"  >> "$GITHUB_OUTPUT"
            echo "deploy=true"      >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:${VER},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "api_url=https://backend.crimsonhaven.to" >> "$GITHUB_OUTPUT"
            echo "site_url=https://crimsonhaven.to" >> "$GITHUB_OUTPUT"
            echo "image_tag=${VER}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "version="         >> "$GITHUB_OUTPUT"
            echo "deploy=false"     >> "$GITHUB_OUTPUT"
            echo "tags=${IMAGE}:dev,${IMAGE}:dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "api_url=https://dev-backend.crimsonhaven.to" >> "$GITHUB_OUTPUT"
            echo "site_url=https://dev.crimsonhaven.to" >> "$GITHUB_OUTPUT"
            # Deploy the immutable per-commit tag, not the rolling :dev, so the
            # dev stack always rolls to exactly this build.
            echo "image_tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (private)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_BASE_URL=${{ steps.meta.outputs.api_url }}
            VITE_SITE_URL=${{ steps.meta.outputs.site_url }}
            VITE_HOSTED_IN=${{ vars.HOSTED_IN }}
            VITE_DMCA_MAIL=${{ vars.DMCA_MAIL }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    needs: build
    if: ${{ needs.build.outputs.deploy == 'true' }}
    runs-on: [self-hosted]
    steps:
      - name: Checkout release
        uses: actions/checkout@v4

      - name: Ship stack file to the manager
        run: |
          scp -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            docker-stack.yml "${SWARM_MANAGER}:/home/raymond/crimson-client-deploy/docker-stack.yml"

      - name: Deploy to the swarm
        env:
          # Via env, not inline interpolation, so the value is never spliced into
          # the runner's command line (it's validated to a safe charset upstream).
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${SWARM_MANAGER}" \
            "/home/raymond/crimson-client-deploy/deploy.sh '${VERSION}'"

  # Dev auto-deploy: a push to `dev` rolls the just-built dev-<sha> frontend onto
  # the crimson-client-dev stack. The dev docker-stack.yml lives on the manager
  # (~/dev-crimson-client-deploy/), so CI just triggers its deploy.sh.
  deploy-dev:
    needs: build
    # A `dev` push OR a sources-driven / manual dispatch both roll the dev stack
    # (releases go through the prod `deploy` job above instead).
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted]
    steps:
      - name: Deploy to the dev swarm stack
        env:
          # Via env, not inline interpolation (see the prod deploy job above).
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new "${SWARM_MANAGER}" \
            "/home/raymond/dev-crimson-client-deploy/deploy.sh '${IMAGE_TAG}'"
