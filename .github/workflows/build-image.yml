name: Build and Tag Docker Image

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*'

jobs:
  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Determine both the tags AND the API URL dynamically
      - name: Set Build Variables
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "IMAGE_TAGS=-t crimson-client:${VERSION} -t crimson-client:latest" >> $GITHUB_OUTPUT
            echo "API_URL=https://backend.crimsonhaven.to:8000" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "IMAGE_TAGS=-t crimson-client:dev -t crimson-client:dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "API_URL=https://dev-backend.crimsonhaven.to:8000" >> $GITHUB_OUTPUT
          fi

      # 2. Build the Docker image, passing the API URL as a build argument
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ steps.vars.outputs.API_URL }}" \
            ${{ steps.vars.outputs.IMAGE_TAGS }} .

      # 3. Clean up dangling images to save disk space
      - name: Prune old images
        run: docker image prune -f