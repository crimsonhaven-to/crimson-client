name: Build Presence Helper

# Cross-compiles the Discord Rich Presence bridge in rpc-helper/ for every
# platform and attaches the binaries to the published GitHub Release, so the
# "download the helper" link on the Preferences page always resolves to the
# latest build (via /releases/latest/download/<asset>).
#
# Builds inside the official golang container so the self-hosted runner only
# needs Docker — same runner crimson-client already uses for image builds.

on:
  release:
    types: [published]

permissions:
  contents: write # required to upload release assets

jobs:
  build:
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cross-compile the helper (Windows · macOS · Linux)
        run: |
          docker run --rm \
            -v "$PWD/rpc-helper:/src" -w /src \
            -e CGO_ENABLED=0 \
            golang:1.26 \
            sh -c '
              set -eu
              mkdir -p dist
              build() { # $1=GOOS  $2=GOARCH  $3=output filename
                GOOS="$1" GOARCH="$2" go build -trimpath -ldflags "-s -w" -o "dist/$3" .
                echo "built dist/$3"
              }
              build windows amd64 crimson-presence-helper-windows-amd64.exe
              build windows arm64 crimson-presence-helper-windows-arm64.exe
              build darwin  amd64 crimson-presence-helper-macos-amd64
              build darwin  arm64 crimson-presence-helper-macos-arm64
              build linux   amd64 crimson-presence-helper-linux-amd64
              build linux   arm64 crimson-presence-helper-linux-arm64
            '

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: rpc-helper/dist/*
